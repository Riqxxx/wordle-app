<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wordle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background: #121213; color: #fff;
            font-family: Arial, sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        header {
            text-align: center; padding: 11px; font-size: 21px; background: #1f1f1f;
        }
        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
            padding: 14px; max-width: 340px; margin: 0 auto;
        }
        .tile {
            width: 58px; height: 58px; border: 2px solid #3a3a3c;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: bold; text-transform: uppercase;
        }
        .tile.correct { background: #538d4e; border-color: #538d4e; color: #fff; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; color: #fff; }
        .tile.absent  { background: #3a3a3c; border-color: #3a3a3c; color: #fff; }

        .keyboard {
            padding: 5px 3px 8px; background: #1f1f1f; margin-top: auto;
        }
        .row {
            display: flex; justify-content: center; gap: 2.5px; margin-bottom: 3px;
        }
        .key {
            background: #3a3a3c; color: #fff; 
            padding: 7px 4px; font-size: 13.8px;
            min-width: 22px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; cursor: pointer; user-select: none; 
            box-shadow: 0 1.5px 0 #222; font-weight: 500;
            transition: all 0.25s;
        }
        .key.wide { min-width: 38px; font-size: 12.5px; padding: 7px 3px; }

        .key.good   { background: #538d4e !important; color: #fff; }
        .key.bad    { background: #555 !important; color: #aaa; }
    </style>
</head>
<body>
    <header>Wordle ✨</header>
    <div id="message"></div>
    <div class="grid" id="grid"></div>
    
    <div class="keyboard">
        <div class="row" id="row1"></div>
        <div class="row" id="row2"></div>
        <div class="row" id="row3"></div>
    </div>

    <div id="result">
        <h2 id="result-title"></h2>
        <p id="result-text"></p>
        <button id="play-again">Играть снова</button>
    </div>

    <script>
        // === РАСШИРЕННЫЙ СПИСОК СЛОВ (только распространённые существительные) ===
        const words = [
            "абзац","аванс","аврал","автор","агент","адрес","азарт","актер","алмаз","аллея","алтар","амбар","ангел","арбуз","арена","арест","астра","атлас","атлет","афера",
            "багаж","багет","балет","банан","банка","баржа","барон","басня","батон","башня","бегун","бедро","берег","берет","бетон","бизон","билет","битва","блюдо","бобер",
            "бокал","бомба","борец","брага","брюхо","будка","буква","букет","булка","буран","вагон","валет","вахта","ведро","веник","весна","ветер","вилка","вирус","вклад",
            "влага","водка","волна","ворот","время","выбор","вывод","выгон","вынос","газон","гайка","галка","гараж","гений","герой","глава","глина","голос","гонка","город",
            "гость","грань","груша","гудок","дачка","дверь","дебют","девиз","десна","детка","диван","длина","дождь","доска","доход","драка","дрель","дубок","жажда","жакет",
            "жатва","жизнь","жираф","забег","забор","завод","загон","закон","замок","запах","заряд","зверь","звено","зебра","зенит","зерно","знамя","золото","идеал","искра",
            "кабан","казна","камин","канал","капля","карта","касса","катер","киоск","кисть","книга","ковер","козел","кокос","колба","комар","конец","копье","короб","кость",
            "кошка","кража","крест","крыло","крыша","кулак","купол","кусок","кухня","лавка","лампа","лента","лимон","лодка","ложка","лучик","маляр","марка","маска","масло",
            "место","мечта","минус","мороз","мосты","музей","навык","налог","напор","наряд","наука","нефть","ножик","норма","обвал","обмен","обувь","огонь","озеро","оклад",
            "олень","омлет","орден","осень","отбор","отказ","отряд","пакет","палец","палка","парус","певец","песок","петля","пирог","пламя","плата","плечо","плита","поезд",
            "покой","полка","порог","порох","поток","почва","право","пресс","приют","проба","пушка","пчела","пятно","ребро","режим","рельс","речка","робот","роман","ручка",
            "рыбак","рынок","салат","сапог","сарай","сахар","свеча","свист","связь","сезон","семья","сетка","синяк","скала","склон","слава","слеза","слово","смена","смысл",
            "собор","совет","сокол","сосна","спина","спорт","среда","стена","стихи","страх","схема","табак","танец","тариф","текст","тесто","ткань","товар","топор","точка",
            "трава","тропа","труба","туман","уголь","удача","улица","факел","ферма","фильм","финиш","форма","фронт","фрукт","халат","хвост","холод","хомяк","хруст","чашка",
            "червь","число","чулок","шапка","шахта","школа","шутка","щепка","щетка","ягода","якорь","яблоко","ящик","дерево","окно","стол","стул","книга","ручка","лампа",
            "машина","поезд","самолет","корабль","домик","сад","лес","река","гора","поле","море","небо","солнце","луна","звезда","друг","враг","семья","мама","папа",
            "брат","сестра","дядя","тетя","сын","дочь","внук","внучка","дед","бабушка","учитель","врач","повар","водитель","инженер","студент","школа","универ","клуб",
            "театр","кино","музей","парк","стадион","магазин","рынок","банк","почта","аптека","кафе","ресторан","отель","вокзал","аэропорт","порт","причал","мост","дорога",
            "улица","площадь","сквер","сад","огород","ферма","завод","фабрика","цех","офис","кабинет","комната","кухня","ванная","балкон","подвал","чердак","крыша","стена",
            "пол","потолок","дверь","окно","штора","ковер","стол","стул","диван","кресло","кровать","шкаф","полка","ящик","сумка","рюкзак","чемодан","зонт","шапка","шарф",
            "перчатка","ботинок","туфля","сапог","платье","рубашка","брюки","юбка","пальто","куртка","свитер","футболка","шорты","носок","галстук","ремень","кошелек","ключ",
            "замок","дверь","окно","стекло","лампа","свет","тень","ночь","день","утро","вечер","час","минута","секунда","время","год","месяц","неделя","дата","число"
        ];

        let targetWord = words[Math.floor(Math.random() * words.length)].toUpperCase();
        let currentRow = 0;
        let currentGuess = [];
        let gameOver = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const resultScreen = document.getElementById('result');
        const resultTitle = document.getElementById('result-title');
        const resultText = document.getElementById('result-text');

        const winMessages = ["Моря, ты молодец ❤️", "Мэгги продолжай в том же духе 🎊", "Мо, тебе сегодня везёт 🍀"];
        const loseMessages = ["Моря, не сдавайся ✨", "Маргоша у тебя всё получится! 😉"];

        // Создание игрового поля
        for (let i = 0; i < 25; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            grid.appendChild(tile);
        }
        const tiles = document.querySelectorAll('.tile');

        const layout = [
            ["Й","Ц","У","К","Е","Н","Г","Ш","Щ","З","Х","Ъ"],
            ["Ф","Ы","В","А","П","Р","О","Л","Д","Ж","Э"],
            ["Я","Ч","С","М","И","Т","Ь","Б","Ю","Ё"]
        ];

        function createKeyboard() {
            const rows = document.querySelectorAll('.row');
            rows.forEach(r => r.innerHTML = '');

            layout.forEach((rowKeys, idx) => {
                const rowDiv = rows[idx];
                rowKeys.forEach(letter => {
                    const key = document.createElement('div');
                    key.className = 'key';
                    key.textContent = letter;
                    key.onclick = () => handleInput(letter);
                    rowDiv.appendChild(key);
                });
            });

            const row3 = rows[2];
            const enter = document.createElement('div'); enter.className = 'key wide'; enter.textContent = 'Enter'; enter.onclick = handleEnter; row3.prepend(enter);
            const back = document.createElement('div'); back.className = 'key wide'; back.textContent = '⌫'; back.onclick = handleBackspace; row3.appendChild(back);
        }

        function handleInput(letter) {
            if (gameOver || currentGuess.length >= 5) return;
            currentGuess.push(letter);
            updateGrid();
        }

        function handleBackspace() {
            if (gameOver) return;
            currentGuess.pop();
            updateGrid();
        }

        function handleEnter() {
            if (gameOver || currentGuess.length !== 5) {
                showMessage(currentGuess.length !== 5 ? 'Нужно 5 букв!' : 'Слова нет в списке!', '#ff6666');
                return;
            }

            const guess = currentGuess.join('');
            if (!words.map(w => w.toUpperCase()).includes(guess)) {
                showMessage('Такого слова нет!', '#ff6666');
                return;
            }

            const rowStart = currentRow * 5;
            const letterCount = {};
            for (let char of targetWord) letterCount[char] = (letterCount[char] || 0) + 1;

            for (let i = 0; i < 5; i++) {
                const letter = currentGuess[i];
                if (letter === targetWord[i]) {
                    tiles[rowStart + i].classList.add('correct');
                    updateKeyboard(letter, 'good');
                    letterCount[letter]--;
                }
            }

            for (let i = 0; i < 5; i++) {
                const tile = tiles[rowStart + i];
                const letter = currentGuess[i];
                if (tile.classList.contains('correct')) continue;

                if (targetWord.includes(letter) && letterCount[letter] > 0) {
                    tile.classList.add('present');
                    updateKeyboard(letter, 'good');
                    letterCount[letter]--;
                } else {
                    tile.classList.add('absent');
                    updateKeyboard(letter, 'bad');
                }
            }

            if (guess === targetWord) {
                gameOver = true;
                showWinScreen();
                return;
            }

            currentRow++;
            currentGuess = [];

            if (currentRow >= 5) {
                gameOver = true;
                showLoseScreen();
            }
        }

        function updateGrid() {
            const rowStart = currentRow * 5;
            for (let i = 0; i < 5; i++) {
                tiles[rowStart + i].textContent = currentGuess[i] || '';
            }
        }

        function updateKeyboard(letter, type) {
            document.querySelectorAll('.key').forEach(key => {
                if (key.textContent === letter) {
                    if (type === 'good') {
                        key.classList.add('good');
                        key.classList.remove('bad');
                    } else if (type === 'bad' && !key.classList.contains('good')) {
                        key.classList.add('bad');
                    }
                }
            });
        }

        function showMessage(text, color = '#fff') {
            messageEl.style.color = color;
            messageEl.textContent = text;
            setTimeout(() => messageEl.textContent = '', 1800);
        }

        function getRandomMessage(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function showWinScreen() {
            resultTitle.textContent = "🎉 Поздравляем!";
            resultTitle.style.color = "#538d4e";
            resultText.textContent = getRandomMessage(winMessages);
            resultScreen.classList.add('show');
        }

        function showLoseScreen() {
            resultTitle.textContent = "😔 Не угадали";
            resultTitle.style.color = "#ff6666";
            resultText.textContent = getRandomMessage(loseMessages);
            resultScreen.classList.add('show');
        }

        document.getElementById('play-again').onclick = () => location.reload();

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        createKeyboard();
        showMessage('Угадайте слово за 5 попыток!', '#fff');
    </script>
</body>
</html>
