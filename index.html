<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wordle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; 
            padding: 0; 
            background: #121213; 
            color: #fff;
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column;
            height: 100vh; 
            overflow: hidden;
        }
        header {
            text-align: center; 
            padding: 11px; 
            font-size: 21px; 
            background: #1f1f1f;
        }
        .grid {
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 6px;
            padding: 14px; 
            max-width: 340px; 
            margin: 0 auto;
        }
        .tile {
            width: 58px; 
            height: 58px; 
            border: 2px solid #3a3a3c;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 26px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .tile.correct { background: #538d4e; border-color: #538d4e; color: #fff; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; color: #fff; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; color: #fff; }

        /* Компактная клавиатура с улучшенным отображением букв */
        .keyboard {
            padding: 5px 3px 8px; 
            background: #1f1f1f; 
            margin-top: auto;
        }
        .row {
            display: flex; 
            justify-content: center; 
            gap: 2.5px; 
            margin-bottom: 3.5px;
        }
        .key {
            background: #3a3a3c; 
            color: #fff; 
            padding: 7px 4px; 
            font-size: 14.2px;
            min-width: 22px; 
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center; 
            border-radius: 4px; 
            cursor: pointer;
            user-select: none; 
            box-shadow: 0 2px 0 #222;
            font-weight: 600;
            transition: all 0.2s;
        }
        .key.wide { 
            min-width: 38px; 
            font-size: 12.8px; 
            padding: 7px 3px;
        }

        /* Цвета только для клавиатуры */
        .key.correct { 
            background: #538d4e !important; 
            color: #fff; 
            border-color: #538d4e;
        }
        .key.absent { 
            background: #555 !important; 
            color: #aaa; 
        }

        #message {
            text-align: center; 
            padding: 7px; 
            font-size: 17px; 
            min-height: 26px;
        }

        #result {
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.93); 
            display: none; 
            align-items: center;
            justify-content: center; 
            z-index: 100; 
            flex-direction: column;
            text-align: center; 
            padding: 20px;
        }
        #result.show { display: flex; }
        #result h2 { font-size: 27px; margin: 10px 0; }
        #result p { 
            font-size: 21px; 
            margin: 14px 0; 
            line-height: 1.4; 
        }
        #play-again {
            margin-top: 22px; 
            padding: 13px 30px; 
            font-size: 17px;
            background: #538d4e; 
            color: white; 
            border: none; 
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>Wordle ✨</header>
    <div id="message"></div>
    <div class="grid" id="grid"></div>
    
    <div class="keyboard">
        <div class="row" id="row1"></div>
        <div class="row" id="row2"></div>
        <div class="row" id="row3"></div>
    </div>

    <div id="result">
        <h2 id="result-title"></h2>
        <p id="result-text"></p>
        <button id="play-again">Играть снова</button>
    </div>

    <script>
        const words = ["длина", "кокос", "пенис", "аббат", "абвер", "абзац", "аборт", "абрис", "аванс", "аврал", "автор", "агент", "агнец", "адепт", "адрес", "азарт", "актер", "акция", "алмаз", "аллея", "алтар", "алтын", "амбар", "ампер", "ангел", "анонс", "антон", "арбуз", "аргон", "арена", "арест", "астра", "атлас", "атлет", "афера", "афиша", "багаж", "багет", "базис", "байка", "бакал", "балет", "балка", "балон", "балык", "банан", "банка", "баржа", "барон", "басня", "батон", "башня", "бегун", "бедро", "белка", "берег", "берет", "бетон", "бидон", "бизон", "билет", "бирка", "битва", "блеск", "блоха", "блюдо", "бобер", "богач", "бокал", "бомба", "бонус", "борец", "бочон", "брага", "бремя", "брюхо", "будка", "буква", "букет", "булка", "буран", "бухта", "вагон", "валет", "валик", "валун", "варяг", "вахта", "ведро", "вежда", "веник", "весна", "ветер", "взвод", "взрыв", "взмах", "взнос", "вилка", "вирус", "виток", "вклад", "влага", "вобла", "водка", "возня", "волна", "волок", "ворон", "ворот", "время", "выбор", "вывод", "выгон", "выдох", "выкуп", "вынос", "вырез", "высот", "газон", "гайка", "галка", "гамак", "гамма", "гараж", "гвард", "гений", "герой", "гидра", "глава", "глина", "глушь", "гномы", "голос", "гонка", "город", "горло", "гость", "грань", "груда", "груша", "гудок", "гуляш", "давка", "дамба", "даром", "дверь", "дебют", "девиз", "декор", "делец", "десна", "детка", "диван", "дизел", "длина", "днище", "добор", "довод", "дождь", "дозор", "докер", "домик", "донор", "доска", "доход", "драка", "драже", "дрель", "дробь", "други", "дубок", "душок", "жажда", "жакет", "жатва", "жгуты", "жизнь", "жилка", "жираф", "жокей", "жрица", "забег", "забой", "забор", "завет", "завод", "завуч", "загон", "задор", "заезд", "заика", "зайка", "закон", "закут", "замес", "замок", "замша", "занос", "запал", "запах", "запор", "заряд", "засов", "зачет", "зверь", "звено", "зебра", "зенит", "зерно", "злоба", "знамя", "знойк", "зовут", "золот", "зрачк", "зубец", "идеал", "изгиб", "износ", "изъян", "икона", "искра", "кабан", "казна", "калач", "камин", "канал", "канат", "капля", "карта", "касса", "катер", "кепка", "кивок", "киоск", "кисть", "кладь", "класс", "книга", "ковер", "козел", "койка", "кокос", "колба", "колос", "комар", "конец", "копия", "копье", "короб", "кость", "кошка", "кража", "крест", "кровь", "крыло", "крыша", "кулак", "купол", "кусок", "кухня", "лавка", "лампа", "лапша", "лента", "лимон", "линия", "лодка", "ложка", "ломка", "лучик", "лыжня", "любов", "маляр", "марка", "маска", "масло", "метка", "место", "мечта", "минус", "мирок", "миска", "модем", "мороз", "мосты", "музей", "мумия", "навык", "нагар", "налог", "напор", "наряд", "насос", "наука", "невод", "недра", "нефть", "нитка", "ножик", "норма", "носка", "обвал", "обмен", "обряд", "обувь", "овраг", "огонь", "озеро", "оклад", "округ", "олень", "омлет", "опора", "орден", "осень", "отбор", "отказ", "отряд", "охота", "пакет", "палец", "палка", "панно", "парус", "паста", "пачка", "певец", "песок", "петля", "пирог", "пламя", "плата", "плечо", "плита", "повод", "погон", "поезд", "покой", "полка", "порог", "порох", "поток", "почва", "право", "пресс", "приют", "проба", "пушка", "пчела", "пятно", "разок", "рамка", "раунд", "ребро", "режим", "резец", "рельс", "репка", "речка", "робот", "ровно", "родня", "рожок", "рознь", "роман", "ручка", "рыбак", "рынок", "рядок", "салат", "сапог", "сарай", "сахар", "сборы", "свеча", "свист", "связь", "сезон", "семья", "серия", "сетка", "силос", "синяк", "скала", "склон", "скоба", "скора", "слава", "слеза", "слово", "смена", "смысл", "снега", "собор", "совет", "сокол", "сосна", "спина", "спорт", "среда", "стадо", "старт", "ствол", "стена", "стихи", "страх", "сцена", "схема", "сырок", "табак", "тазик", "танец", "тариф", "текст", "тепло", "тесто", "титан", "ткань", "товар", "топор", "точка", "трава", "тропа", "труба", "туман", "уголь", "удача", "уклон", "улица", "урокк", "утюгг", "факел", "фауна", "ферма", "фильм", "финиш", "фишка", "форма", "фронт", "фрукт", "халат", "хвост", "холод", "хомяк", "хруст", "цветы", "чашка", "червь", "число", "чулок", "шапка", "шахта", "школа", "шланг", "шпага", "шпион", "штора", "шутка", "щепка", "щетка", "юрист", "ягода", "якорь"];

        let targetWord = words[Math.floor(Math.random() * words.length)].toUpperCase();
        let currentRow = 0;
        let currentGuess = [];
        let gameOver = false;

        const grid = document.getElementById('grid');
        const messageEl = document.getElementById('message');
        const resultScreen = document.getElementById('result');
        const resultTitle = document.getElementById('result-title');
        const resultText = document.getElementById('result-text');

        const winMessages = [
            "Моря, ты молодец ❤️",
            "Мэгги продолжай в том же духе 🎊",
            "Мо, тебе сегодня везёт 🍀"
        ];

        const loseMessages = [
            "Моря, не сдавайся ✨",
            "Маргоша у тебя всё получится! 😉"
        ];

        for (let i = 0; i < 25; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            grid.appendChild(tile);
        }
        const tiles = document.querySelectorAll('.tile');

        const layout = [
            ["Й","Ц","У","К","Е","Н","Г","Ш","Щ","З","Х","Ъ"],
            ["Ф","Ы","В","А","П","Р","О","Л","Д","Ж","Э"],
            ["Я","Ч","С","М","И","Т","Ь","Б","Ю","Ё"]
        ];

        function createKeyboard() {
            const rows = document.querySelectorAll('.row');
            rows.forEach(row => row.innerHTML = '');

            layout.forEach((rowKeys, idx) => {
                const rowDiv = rows[idx];
                rowKeys.forEach(letter => {
                    const key = document.createElement('div');
                    key.className = 'key';
                    key.textContent = letter;
                    key.onclick = () => handleInput(letter);
                    rowDiv.appendChild(key);
                });
            });

            const row3 = rows[2];
            const enter = document.createElement('div');
            enter.className = 'key wide';
            enter.textContent = 'Enter';
            enter.onclick = handleEnter;
            row3.prepend(enter);

            const back = document.createElement('div');
            back.className = 'key wide';
            back.textContent = '⌫';
            back.onclick = handleBackspace;
            row3.appendChild(back);
        }

        function handleInput(letter) {
            if (gameOver || currentGuess.length >= 5) return;
            currentGuess.push(letter);
            updateGrid();
        }

        function handleBackspace() {
            if (gameOver) return;
            currentGuess.pop();
            updateGrid();
        }

        function handleEnter() {
            if (gameOver || currentGuess.length !== 5) {
                showMessage(currentGuess.length !== 5 ? 'Нужно 5 букв!' : 'Слова нет в списке!', '#ff6666');
                return;
            }

            const guess = currentGuess.join('');
            if (!words.map(w => w.toUpperCase()).includes(guess)) {
                showMessage('Такого слова нет!', '#ff6666');
                return;
            }

            const rowStart = currentRow * 5;
            const letterCount = {};
            for (let char of targetWord) letterCount[char] = (letterCount[char] || 0) + 1;

            // Сначала зелёные
            for (let i = 0; i < 5; i++) {
                const tile = tiles[rowStart + i];
                const letter = currentGuess[i];
                if (letter === targetWord[i]) {
                    tile.classList.add('correct');
                    updateKeyboard(letter, 'correct');
                    letterCount[letter]--;
                }
            }

            // Потом жёлтые и серые на поле
            for (let i = 0; i < 5; i++) {
                const tile = tiles[rowStart + i];
                const letter = currentGuess[i];
                if (tile.classList.contains('correct')) continue;

                if (targetWord.includes(letter) && letterCount[letter] > 0) {
                    tile.classList.add('present');
                    letterCount[letter]--;
                } else {
                    tile.classList.add('absent');
                    updateKeyboard(letter, 'absent');
                }
            }

            if (guess === targetWord) {
                gameOver = true;
                showWinScreen();
                return;
            }

            currentRow++;
            currentGuess = [];

            if (currentRow >= 5) {
                gameOver = true;
                showLoseScreen();
            }
        }

        function updateGrid() {
            const rowStart = currentRow * 5;
            for (let i = 0; i < 5; i++) {
                const tile = tiles[rowStart + i];
                tile.textContent = currentGuess[i] || '';
            }
        }

        function updateKeyboard(letter, status) {
            document.querySelectorAll('.key').forEach(key => {
                if (key.textContent === letter) {
                    if (status === 'correct') {
                        key.classList.add('correct');
                    } else if (status === 'absent' && 
                               !key.classList.contains('correct')) {
                        key.classList.add('absent');
                    }
                }
            });
        }

        function showMessage(text, color = '#fff') {
            messageEl.style.color = color;
            messageEl.textContent = text;
            setTimeout(() => messageEl.textContent = '', 1800);
        }

        function getRandomMessage(messages) {
            return messages[Math.floor(Math.random() * messages.length)];
        }

        function showWinScreen() {
            resultTitle.textContent = "🎉 Поздравляем!";
            resultTitle.style.color = "#538d4e";
            resultText.textContent = getRandomMessage(winMessages);
            resultScreen.classList.add('show');
        }

        function showLoseScreen() {
            resultTitle.textContent = "😔 Не угадали";
            resultTitle.style.color = "#ff6666";
            resultText.textContent = getRandomMessage(loseMessages);
            resultScreen.classList.add('show');
        }

        document.getElementById('play-again').onclick = () => location.reload();

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        createKeyboard();
        showMessage('Угадайте слово за 5 попыток!', '#fff');
    </script>
</body>
</html>
